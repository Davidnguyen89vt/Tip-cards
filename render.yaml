services:
  - type: web
    name: venmo-card
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/technicians
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
    disk:
      name: venmo-card-data
      mountPath: /var/data
      sizeGB: 1
